<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asilakon</title>
    <link rel="stylesheet" href="css/home.css">
    <script src="../js/main.js"></script>
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="navbar-brand">
                <img src="media/images/AsilakonLogo.png" alt="Logo" class="logo" onclick="scrollToSection('homescreen')">
            </div>
            <div class="navbar-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Sections</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </header>

    <div class="group_picture-wrapper" id="homescreen">
        <div class="group_picture">
            <img id="upper" src="media/images/All_Gradient.jpg">
            <img id="lower" src="media/images/Lower.png">
        </div>
        <div class="title_labels">
            <div id="asilakon_title">ASILAKON</div>
            <div id="graduates_hub_title">Graduates Hub</div>
        </div>
    </div>      

    <div class="content">
        <div id="background_label">ASILAKON</div>
        <img id="item1" src="media/images/Assets/item1.png">
        <section class="section">
            <img src="media/images/Curie_Group.jpg" class="section_picture">
            <div class="section_name">
                <div class="section_name_front">CURIE</div>
                <div class="section_name_back">CURIE</div>
                <div class="view_students" id="curie_button" onclick="navigate('html/curie.html')">View Students</div>
            </div>   
        </section>
        <section class="section">
            <img src="media/images/Einstein_Group.jpg" class="section_picture">
            <div class="section_name">
                <div class="section_name_front">EINSTEIN</div>
                <div class="section_name_back">EINSTEIN</div>
                <div class="view_students" id="einstein_button" onclick="navigate('html/einstein.html')">View Students</div>
            </div>   
        </section>
        <section class="section">
            <img src="media/images/Tesla_Group.jpg" class="section_picture">
            <div class="section_name">
                <div class="section_name_front">TESLA</div>
                <div class="section_name_back">TESLA</div>
                <div class="view_students" id="tesla_button" onclick="navigate('html/tesla.html')">View Students</div>
            </div>   
        </section>
    </div>

    <script src="js/home.js"></script>
    
</body>
</html>
